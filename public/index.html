<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PE Tracker — Private Equity Ownership Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a38;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --text: #e8e8f0;
    --muted: #6b6b82;
    --danger: #ff6b6b;
    --green: #47ffb8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* Header */
  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .header-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo-block {}

  .logo-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
  }

  h1 span {
    color: var(--accent);
  }

  .header-meta {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    line-height: 1.8;
  }

  /* Search area */
  .search-section {
    margin-bottom: 40px;
  }

  .search-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  .search-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .search-input-wrap {
    flex: 1;
    position: relative;
  }

  .search-input-wrap::before {
    content: '>';
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    font-size: 16px;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    padding: 16px 20px 16px 40px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder {
    color: var(--muted);
  }

  .search-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 16px 32px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .search-btn:hover:not(:disabled) {
    background: #fff;
    transform: translateY(-1px);
  }

  .search-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Mode pills */
  .mode-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .mode-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .mode-pill:hover, .mode-pill.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(71, 200, 255, 0.06);
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 32px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    min-height: 48px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1s infinite;
  }

  .status-dot.done { background: var(--green); }
  .status-dot.error { background: var(--danger); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Results */
  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .results-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .results-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 14px 20px;
    text-align: left;
    white-space: nowrap;
  }

  th:first-child { border-right: 1px solid var(--border); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 18px 20px;
    font-size: 14px;
    vertical-align: top;
  }

  td:first-child {
    border-right: 1px solid var(--border);
    font-weight: 700;
    font-size: 15px;
  }

  .company-name { font-weight: 700; }

  .company-sector {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.05em;
  }

  .pe-firm {
    font-weight: 600;
    color: var(--accent2);
  }

  .deal-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--green);
    font-weight: 500;
  }

  .deal-value.unknown {
    color: var(--muted);
    font-style: italic;
  }

  .deal-date {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .confidence {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    letter-spacing: 0.05em;
  }

  .confidence.high { color: var(--green); border: 1px solid var(--green); }
  .confidence.medium { color: var(--accent); border: 1px solid var(--accent); }
  .confidence.low { color: var(--muted); border: 1px solid var(--muted); }

  /* Empty / loading states */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }

  .empty-state .big-label {
    font-family: 'DM Mono', monospace;
    font-size: 48px;
    font-weight: 300;
    opacity: 0.2;
    margin-bottom: 16px;
  }

  .empty-state p {
    font-size: 14px;
    line-height: 1.7;
  }

  /* Loading skeleton */
  .skeleton-row td {
    padding: 20px;
  }

  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 2px;
    height: 14px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Notes / sources */
  .sources-block {
    margin-top: 24px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
  }

  .sources-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .sources-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }

  .sources-text a {
    color: var(--accent2);
    text-decoration: none;
  }

  .disclaimer {
    margin-top: 16px;
    padding: 12px 16px;
    border: 1px solid rgba(255,107,107,0.3);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,107,107,0.7);
    line-height: 1.6;
  }

  footer {
    margin-top: 80px;
    padding: 32px 0;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  footer span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo-block">
        <div class="logo-tag">// PE Tracker v1.0</div>
        <h1>Private<br><span>Equity</span><br>Intel</h1>
      </div>
      <div class="header-meta">
        AI-powered ownership lookup<br>
        Backed by live web search<br>
        <span style="color: var(--accent)">claude-sonnet-4-20250514</span>
      </div>
    </div>
  </header>

  <section class="search-section">
    <span class="search-label">// Search query</span>
    <div class="search-row">
      <div class="search-input-wrap">
        <input type="text" id="queryInput" placeholder="e.g. Petco, Bausch Health, restaurant chains, healthcare..." />
      </div>
      <button class="search-btn" id="searchBtn" onclick="runSearch()">Look Up →</button>
    </div>
    <div class="mode-row">
      <button class="mode-pill active" data-mode="company" onclick="setMode(this)">Specific Company</button>
      <button class="mode-pill" data-mode="industry" onclick="setMode(this)">By Industry</button>
      <button class="mode-pill" data-mode="firm" onclick="setMode(this)">By PE Firm</button>
      <button class="mode-pill" data-mode="recent" onclick="setMode(this)">Recent Deals</button>
    </div>
  </section>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready — enter a company name, industry, or PE firm to begin</span>
  </div>

  <div id="resultsArea"></div>

  <footer>
    <span>PE Tracker — Private Equity Intelligence</span>
    <span>Data sourced via AI + web search • Not financial advice</span>
  </footer>
</div>

<script>
let currentMode = 'company';

function setMode(el) {
  document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentMode = el.dataset.mode;
  const placeholders = {
    company: 'e.g. Petco, Bausch Health, Asurion...',
    industry: 'e.g. healthcare, restaurant chains, software...',
    firm: 'e.g. KKR, Blackstone, Apollo Global...',
    recent: 'e.g. 2024, last 6 months, Q1 2025...'
  };
  document.getElementById('queryInput').placeholder = placeholders[currentMode];
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
  document.getElementById('statusText').textContent = text;
}

function showSkeletons() {
  const rows = Array(5).fill(0).map(() => `
    <tr class="skeleton-row">
      <td><div class="skeleton" style="width:70%"></div><div class="skeleton" style="width:45%;margin-top:8px;height:10px"></div></td>
      <td><div class="skeleton" style="width:80%"></div></td>
      <td><div class="skeleton" style="width:60%"></div></td>
      <td><div class="skeleton" style="width:55%"></div></td>
      <td><div class="skeleton" style="width:40%"></div></td>
    </tr>`).join('');

  document.getElementById('resultsArea').innerHTML = `
    <div class="results-header">
      <span class="results-title">Results</span>
      <span class="results-count">Loading...</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Company</th>
            <th>PE Firm</th>
            <th>Deal Value</th>
            <th>Acquired</th>
            <th>Confidence</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderResults(data) {
  const { companies, notes, query } = data;

  if (!companies || companies.length === 0) {
    document.getElementById('resultsArea').innerHTML = `
      <div class="empty-state">
        <div class="big-label">∅</div>
        <p>No PE-backed companies found for "<strong>${query}</strong>".<br>
        Try broadening your search or checking the spelling.</p>
      </div>`;
    return;
  }

  const rows = companies.map(c => {
    const valueClass = c.deal_value && c.deal_value !== 'Unknown' ? 'deal-value' : 'deal-value unknown';
    const valueText = c.deal_value && c.deal_value !== 'Unknown' ? c.deal_value : 'undisclosed';
    const confClass = c.confidence === 'High' ? 'high' : c.confidence === 'Medium' ? 'medium' : 'low';

    return `<tr>
      <td>
        <div class="company-name">${escHtml(c.company)}</div>
        ${c.sector ? `<div class="company-sector">${escHtml(c.sector)}</div>` : ''}
      </td>
      <td><span class="pe-firm">${escHtml(c.pe_firm)}</span></td>
      <td><span class="${valueClass}">${escHtml(valueText)}</span></td>
      <td><span class="deal-date">${escHtml(c.acquired || 'Unknown')}</span></td>
      <td><span class="confidence ${confClass}">${escHtml(c.confidence || 'Low')}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('resultsArea').innerHTML = `
    <div class="results-header">
      <span class="results-title">Results</span>
      <span class="results-count">${companies.length} entr${companies.length === 1 ? 'y' : 'ies'} found</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Company</th>
            <th>PE Firm</th>
            <th>Deal Value</th>
            <th>Acquired</th>
            <th>Confidence</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${notes ? `
    <div class="sources-block">
      <div class="sources-label">// Research notes</div>
      <div class="sources-text">${escHtml(notes)}</div>
    </div>` : ''}
    <div class="disclaimer">
      ⚠ Data sourced via AI-assisted web research. Always verify deal details with official filings, press releases, or financial data providers before making business decisions.
    </div>`;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function runSearch() {
  const query = document.getElementById('queryInput').value.trim();
  if (!query) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  setStatus('active', `Searching for PE ownership data: "${query}"...`);
  showSkeletons();

  const modeInstructions = {
    company: `Find private equity ownership information for the specific company or companies named: "${query}". Look up which PE firm owns or has acquired them, deal value, and acquisition date.`,
    industry: `Find companies in the "${query}" industry or sector that are owned by private equity firms. List multiple companies if possible.`,
    firm: `List portfolio companies owned by the PE firm "${query}". Include deal values and acquisition dates for each.`,
    recent: `Find recent private equity deals and acquisitions from ${query}. List the companies acquired, by which PE firm, and for how much.`
  };

  const systemPrompt = `You are a private equity research assistant with access to web search. The user wants to know about PE firm ownership of companies.

Search the web thoroughly for accurate, up-to-date information. Return ONLY a JSON object with this exact structure:
{
  "query": "the original query",
  "companies": [
    {
      "company": "Company Name",
      "sector": "Industry/Sector",
      "pe_firm": "PE Firm Name",
      "deal_value": "$X billion or Unknown",
      "acquired": "Year or Month Year or Unknown",
      "confidence": "High|Medium|Low"
    }
  ],
  "notes": "Any important caveats, partial info, or research notes in 1-2 sentences."
}

Confidence levels:
- High: confirmed by multiple reliable sources (WSJ, Bloomberg, Reuters, SEC filings)
- Medium: reported by one credible source
- Low: inferred or from secondary sources

Use web search to find current, accurate information. Return ONLY valid JSON, no markdown, no preamble.`;


  try {
    const response = await fetch("/api/search", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: query, mode: currentMode })
    });
    if (!response.ok) throw new Error(`Server error: ${response.status}`);
    const parsed = await response.json();
    renderResults(parsed);
    setStatus('done', `Found ${parsed.companies?.length || 0} result(s) for "${query}" — data sourced via web search`);
  } catch (err) {
    console.error(err);
    setStatus('error', `Error: ${err.message}`);
    document.getElementById('resultsArea').innerHTML = `
      <div class="empty-state">
        <div class="big-label">!</div>
        <p>Something went wrong: <strong>${escHtml(err.message)}</strong><br>
        Please try again.</p>
      </div>`;
  } finally {
    btn.disabled = false;
  }
}

// Enter key support
document.getElementById('queryInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') runSearch();
});
</script>
</body>
</html>
