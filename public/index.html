<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is This PE? — Private Equity Ownership Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a38;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --text: #e8e8f0;
    --muted: #6b6b82;
    --danger: #ff6b6b;
    --green: #47ffb8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* Header */
  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .header-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
  }

  h1 span { color: var(--accent); }

  .header-meta {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    line-height: 1.8;
  }

  /* Quick searches */
  .quick-section {
    margin-bottom: 32px;
  }

  .quick-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  .quick-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .quick-chip {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 7px 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .quick-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.05);
  }

  .quick-chip .chip-icon {
    font-size: 10px;
    opacity: 0.5;
  }

  .quick-chip.industry { border-color: rgba(71,200,255,0.3); color: var(--accent2); }
  .quick-chip.industry:hover { border-color: var(--accent2); background: rgba(71,200,255,0.05); }
  .quick-chip.firm { border-color: rgba(71,255,184,0.3); color: var(--green); }
  .quick-chip.firm:hover { border-color: var(--green); background: rgba(71,255,184,0.05); }

  /* Search */
  .search-section { margin-bottom: 24px; }

  .search-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  .search-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .search-input-wrap {
    flex: 1;
    position: relative;
  }

  .search-input-wrap::before {
    content: '>';
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    font-size: 16px;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    padding: 16px 20px 16px 40px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .search-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 16px 32px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .search-btn:hover:not(:disabled) { background: #fff; transform: translateY(-1px); }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .mode-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .mode-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .mode-pill:hover, .mode-pill.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(71, 200, 255, 0.06);
  }

  /* Loading UI */
  .loading-state {
    padding: 48px 24px;
    border: 1px solid var(--border);
    background: var(--surface);
    text-align: center;
  }

  .loading-steps {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 320px;
    margin: 0 auto;
  }

  .loading-step {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    opacity: 0.3;
    transition: all 0.4s ease;
  }

  .loading-step.active {
    opacity: 1;
    color: var(--text);
  }

  .loading-step.done {
    opacity: 0.6;
    color: var(--green);
  }

  .step-icon {
    font-size: 18px;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .step-bar {
    flex: 1;
    height: 2px;
    background: var(--border);
    margin-top: 4px;
    position: relative;
    overflow: hidden;
  }

  .step-bar-fill {
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.8s ease;
  }

  .loading-step.active .step-bar-fill {
    transform: translateX(-20%);
    animation: barPulse 1.2s ease-in-out infinite alternate;
  }

  .loading-step.done .step-bar-fill {
    transform: translateX(0);
    background: var(--green);
    animation: none;
  }

  @keyframes barPulse {
    from { transform: translateX(-30%); }
    to { transform: translateX(-5%); }
  }

  .loading-note {
    margin-top: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    opacity: 0.6;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 32px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    min-height: 48px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1s infinite;
  }

  .status-dot.done { background: var(--green); }
  .status-dot.error { background: var(--danger); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Results */
  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .results-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .results-count { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); }

  .table-wrap { overflow-x: auto; border: 1px solid var(--border); }

  table { width: 100%; border-collapse: collapse; }

  thead { background: var(--surface2); border-bottom: 1px solid var(--border); }

  th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 14px 20px;
    text-align: left;
    white-space: nowrap;
  }

  th:first-child { border-right: 1px solid var(--border); }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td { padding: 18px 20px; font-size: 14px; vertical-align: top; }
  td:first-child { border-right: 1px solid var(--border); font-weight: 700; font-size: 15px; }

  .company-sector {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.05em;
  }

  .pe-firm { font-weight: 600; color: var(--accent2); }

  .deal-value { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--green); font-weight: 500; }
  .deal-value.unknown { color: var(--muted); font-style: italic; }

  .deal-date { font-family: 'DM Mono', monospace; font-size: 13px; }

  .confidence {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    letter-spacing: 0.05em;
  }

  .confidence.high { color: var(--green); border: 1px solid var(--green); }
  .confidence.medium { color: var(--accent); border: 1px solid var(--accent); }
  .confidence.low { color: var(--muted); border: 1px solid var(--muted); }

  .empty-state { text-align: center; padding: 80px 24px; color: var(--muted); }
  .empty-state .big-label { font-family: 'DM Mono', monospace; font-size: 48px; font-weight: 300; opacity: 0.2; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; line-height: 1.7; }

  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 2px;
    height: 14px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .sources-block {
    margin-top: 24px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
  }

  .sources-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .sources-text { font-size: 13px; color: var(--muted); line-height: 1.7; }

  .disclaimer {
    margin-top: 16px;
    padding: 12px 16px;
    border: 1px solid rgba(255,107,107,0.3);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,107,107,0.7);
    line-height: 1.6;
  }

  footer {
    margin-top: 80px;
    padding: 32px 0;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  footer span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo-block">
        <div class="logo-tag">// isthispe.com</div>
        <h1>Is This<br><span>PE?</span></h1>
      </div>
      <div class="header-meta">
        Find out if a company<br>is owned by private equity<br>
        <span style="color: var(--accent)">AI + live web search</span>
      </div>
    </div>
  </header>

  <!-- Quick searches -->
  <section class="quick-section">
    <span class="quick-label">// Popular searches</span>
    <div class="quick-grid">
      <button class="quick-chip" onclick="quickSearch('Petco', 'company')"><span class="chip-icon">🐾</span> Petco</button>
      <button class="quick-chip" onclick="quickSearch('PetSmart', 'company')"><span class="chip-icon">🐶</span> PetSmart</button>
      <button class="quick-chip" onclick="quickSearch('Panera Bread', 'company')"><span class="chip-icon">🥖</span> Panera Bread</button>
      <button class="quick-chip" onclick="quickSearch('Burger King', 'company')"><span class="chip-icon">🍔</span> Burger King</button>
      <button class="quick-chip" onclick="quickSearch('Guitar Center', 'company')"><span class="chip-icon">🎸</span> Guitar Center</button>
      <button class="quick-chip" onclick="quickSearch('Mattress Firm', 'company')"><span class="chip-icon">🛏</span> Mattress Firm</button>
      <button class="quick-chip" onclick="quickSearch('Dave & Busters', 'company')"><span class="chip-icon">🎮</span> Dave & Busters</button>
      <button class="quick-chip" onclick="quickSearch('GNC', 'company')"><span class="chip-icon">💊</span> GNC</button>
      <button class="quick-chip industry" onclick="quickSearch('veterinary clinics', 'industry')"><span class="chip-icon">🏥</span> Vet Clinics</button>
      <button class="quick-chip industry" onclick="quickSearch('urgent care', 'industry')"><span class="chip-icon">⚕️</span> Urgent Care</button>
      <button class="quick-chip industry" onclick="quickSearch('dental offices', 'industry')"><span class="chip-icon">🦷</span> Dental</button>
      <button class="quick-chip industry" onclick="quickSearch('nursing homes', 'industry')"><span class="chip-icon">👴</span> Nursing Homes</button>
      <button class="quick-chip firm" onclick="quickSearch('Blackstone', 'firm')"><span class="chip-icon">🏦</span> Blackstone</button>
      <button class="quick-chip firm" onclick="quickSearch('KKR', 'firm')"><span class="chip-icon">🏦</span> KKR</button>
      <button class="quick-chip firm" onclick="quickSearch('Apollo Global', 'firm')"><span class="chip-icon">🏦</span> Apollo</button>
    </div>
  </section>

  <section class="search-section">
    <span class="search-label">// Or search anything</span>
    <div class="search-row">
      <div class="search-input-wrap">
        <input type="text" id="queryInput" placeholder="e.g. Petco, Bausch Health, restaurant chains..." />
      </div>
      <button class="search-btn" id="searchBtn" onclick="runSearch()">Look Up →</button>
    </div>
    <div class="mode-row">
      <button class="mode-pill active" data-mode="company" onclick="setMode(this)">Specific Company</button>
      <button class="mode-pill" data-mode="industry" onclick="setMode(this)">By Industry</button>
      <button class="mode-pill" data-mode="firm" onclick="setMode(this)">By PE Firm</button>
      <button class="mode-pill" data-mode="recent" onclick="setMode(this)">Recent Deals</button>
    </div>
  </section>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready — search a company, industry, or PE firm above</span>
  </div>

  <div id="resultsArea"></div>

  <footer>
    <span>isthispe.com — Private Equity Ownership Intelligence</span>
    <span>Data via AI + web search • Not financial advice</span>
  </footer>
</div>

<script>
let currentMode = 'company';

function setMode(el) {
  document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentMode = el.dataset.mode;
  const placeholders = {
    company: 'e.g. Petco, Bausch Health, Asurion...',
    industry: 'e.g. healthcare, restaurant chains, software...',
    firm: 'e.g. KKR, Blackstone, Apollo Global...',
    recent: 'e.g. 2024, last 6 months, Q1 2025...'
  };
  document.getElementById('queryInput').placeholder = placeholders[currentMode];
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
  document.getElementById('statusText').textContent = text;
}

function quickSearch(query, mode) {
  document.getElementById('queryInput').value = query;
  document.querySelectorAll('.mode-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.mode === mode);
  });
  currentMode = mode;
  runSearch();
}

// Animated loading steps
const LOADING_STEPS = [
  { icon: '🔍', label: 'Searching the web...' },
  { icon: '🧠', label: 'Analyzing PE ownership...' },
  { icon: '📊', label: 'Structuring results...' },
  { icon: '💾', label: 'Saving to database...' },
];

function showLoadingUI(query) {
  const stepsHTML = LOADING_STEPS.map((s, i) => `
    <div class="loading-step" id="lstep-${i}">
      <span class="step-icon">${s.icon}</span>
      <div style="flex:1">
        <div>${s.label}</div>
        <div class="step-bar"><div class="step-bar-fill" id="lstep-bar-${i}"></div></div>
      </div>
    </div>`).join('');

  document.getElementById('resultsArea').innerHTML = `
    <div class="loading-state">
      <div class="loading-steps">${stepsHTML}</div>
      <div class="loading-note">This may take 10–20 seconds for new searches.<br>Cached results return instantly.</div>
    </div>`;

  // Animate steps
  let step = 0;
  activateStep(0);
  const interval = setInterval(() => {
    step++;
    if (step < LOADING_STEPS.length) {
      markStepDone(step - 1);
      activateStep(step);
    } else {
      clearInterval(interval);
    }
  }, 4000);

  return interval;
}

function activateStep(i) {
  const el = document.getElementById(`lstep-${i}`);
  if (el) el.classList.add('active');
}

function markStepDone(i) {
  const el = document.getElementById(`lstep-${i}`);
  if (el) { el.classList.remove('active'); el.classList.add('done'); }
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderResults(data, fromCache) {
  const { companies, notes, query } = data;

  if (!companies || companies.length === 0) {
    document.getElementById('resultsArea').innerHTML = `
      <div class="empty-state">
        <div class="big-label">∅</div>
        <p>No PE-backed companies found for "<strong>${escHtml(query)}</strong>".<br>
        Try broadening your search or checking the spelling.</p>
      </div>`;
    return;
  }

  const rows = companies.map(c => {
    const valueClass = c.deal_value && c.deal_value !== 'Unknown' ? 'deal-value' : 'deal-value unknown';
    const valueText = c.deal_value && c.deal_value !== 'Unknown' ? c.deal_value : 'undisclosed';
    const confClass = c.confidence === 'High' ? 'high' : c.confidence === 'Medium' ? 'medium' : 'low';
    return `<tr>
      <td>
        <div class="company-name">${escHtml(c.company)}</div>
        ${c.sector ? `<div class="company-sector">${escHtml(c.sector)}</div>` : ''}
      </td>
      <td><span class="pe-firm">${escHtml(c.pe_firm)}</span></td>
      <td><span class="${valueClass}">${escHtml(valueText)}</span></td>
      <td><span class="deal-date">${escHtml(c.acquired || 'Unknown')}</span></td>
      <td><span class="confidence ${confClass}">${escHtml(c.confidence || 'Low')}</span></td>
    </tr>`;
  }).join('');

  const cacheTag = fromCache
    ? `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--green);margin-left:12px;">⚡ instant (cached)</span>`
    : '';

  document.getElementById('resultsArea').innerHTML = `
    <div class="results-header">
      <span class="results-title">Results ${cacheTag}</span>
      <span class="results-count">${companies.length} entr${companies.length === 1 ? 'y' : 'ies'} found</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Company</th>
            <th>PE Firm</th>
            <th>Deal Value</th>
            <th>Acquired</th>
            <th>Confidence</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${notes ? `
    <div class="sources-block">
      <div class="sources-label">// Research notes</div>
      <div class="sources-text">${escHtml(notes)}</div>
    </div>` : ''}
    <div class="disclaimer">
      ⚠ Data sourced via AI-assisted web research. Always verify deal details with official filings, press releases, or financial data providers before making business decisions.
    </div>`;
}

async function runSearch() {
  const query = document.getElementById('queryInput').value.trim();
  if (!query) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  setStatus('active', `Looking up "${query}"...`);

  const loadingTimer = showLoadingUI(query);

  try {
    const response = await fetch("/api/search", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, mode: currentMode })
    });

    clearInterval(loadingTimer);

    if (!response.ok) throw new Error(`Server error: ${response.status}`);
    const parsed = await response.json();

    renderResults(parsed, parsed._cache);
    const cacheNote = parsed._cache ? '⚡ instant result from cache' : `sourced via live web search in ${parsed._duration_ms}ms`;
    setStatus('done', `Found ${parsed.companies?.length || 0} result(s) for "${query}" — ${cacheNote}`);
  } catch (err) {
    clearInterval(loadingTimer);
    console.error(err);
    setStatus('error', `Error: ${err.message}`);
    document.getElementById('resultsArea').innerHTML = `
      <div class="empty-state">
        <div class="big-label">!</div>
        <p>Something went wrong: <strong>${escHtml(err.message)}</strong><br>
        Please try again in a moment.</p>
      </div>`;
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('queryInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') runSearch();
});
</script>
</body>
</html>
